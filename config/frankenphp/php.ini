; FrankenPHP php.ini for Waaseyaa.
;
; Load this file ADDITIVELY via PHP_INI_SCAN_DIR when launching FrankenPHP
; natively, so these settings layer on top of the runtime's own php.ini:
;
;     PHP_INI_SCAN_DIR="$PWD/config/frankenphp" frankenphp run --config config/frankenphp/Caddyfile
;
; Do NOT load it via PHPRC. PHPRC *replaces* the FrankenPHP binary's bundled
; php.ini wholesale — and on the common shared-extension builds (e.g. the
; official Windows release) that bundled ini is exactly what sets `extension_dir`
; and loads pdo_sqlite/sqlite3. Replacing it strands the SQLite driver, so every
; request 500s with "could not find driver" out of DBALDatabase::createSqlite().
; PHP_INI_SCAN_DIR keeps the bundled ini intact and merges these settings in.
;
; Why this file exists: Waaseyaa defaults to a SQLite database
; (storage/waaseyaa.sqlite), so the PHP runtime MUST have pdo_sqlite + sqlite3.
;
; The `extension=` lines below are COMMENTED OUT by default. Almost every
; FrankenPHP binary already provides pdo_sqlite + sqlite3 — either compiled in
; (truly-static builds) or loaded by its own bundled ini (shared-extension
; builds). In both cases force-loading them from HERE is wrong: on a static build
; PHP tries a bogus dynamic load and unregisters the driver; on a scan-dir merge
; this ini has no `extension_dir`, so the load fails against the default path.
; Either way you get "could not find driver".
;
; Only uncomment these if your runtime genuinely LACKS the extensions (a custom
; build without sqlite), and set `extension_dir` below to the directory that
; actually contains the .so/.dll modules.
; extension_dir = "/path/to/php/ext"
; extension=pdo_sqlite
; extension=sqlite3

; Stream Server-Sent Events (/api/broadcast) to the client immediately. Output
; buffering would hold SSE frames and defeat the realtime admin updates.
output_buffering = Off
implicit_flush = On

; Surface boot errors during local development.
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
