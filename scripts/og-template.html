<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Site default OG card for rhtcircle.ca (og-default.png): the failsafe used
       for any page that has no per-page card yet. Same brand language as the
       auto card: the rainbow rule, indigo-violet, a coral accent, Fraunces. */
    :root {
      --paper: #fbfaff;
      --indigo: #4f2fb0;
      --indigo-deep: #38217f;
      --magenta: #c41d8f;
      --coral: #f4795a;
      --ink: #221d33;
      --ink-2: #4a4361;
      --ink-3: #6f6688;
      --rainbow: linear-gradient(90deg,
        #cc2484 0%, #a824a8 14%, #6c30d8 28%, #4854cc 40%,
        #2f80c4 52%, #17a8ba 64%, #5bb87a 74%, #f6d05e 84%,
        #f9781f 93%, #e0452a 100%);
      --serif: "Fraunces", Georgia, "Iowan Old Style", serif;
      --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: var(--paper);
      font-family: var(--sans);
      color: var(--ink);
      position: relative;
    }

    .rainbow { position: absolute; top: 0; left: 0; right: 0; height: 12px; background: var(--rainbow); z-index: 3; }

    .coral {
      position: absolute;
      bottom: -180px;
      right: -140px;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(244,121,90,0.30) 0%, rgba(244,121,90,0.15) 55%, transparent 72%);
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding: 76px 90px;
    }

    .eyebrow {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--indigo);
      margin-bottom: 26px;
    }

    h1 {
      font-family: var(--serif);
      font-size: 72px;
      font-weight: 600;
      line-height: 1.04;
      letter-spacing: -0.022em;
      color: var(--indigo-deep);
      max-width: 940px;
      margin-bottom: 28px;
    }
    h1 .dot { color: var(--magenta); }

    .subline {
      font-size: 25px;
      font-weight: 400;
      color: var(--ink-2);
      line-height: 1.42;
      max-width: 880px;
      margin-bottom: 40px;
    }

    .foot { display: flex; align-items: center; gap: 16px; }
    .url { font-size: 17px; font-weight: 600; color: var(--magenta); }
    .sep { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); }
    .tagline { font-size: 17px; font-weight: 500; color: var(--ink-3); }
  </style>
</head>
<body>
  <div class="rainbow"></div>
  <div class="coral"></div>

  <div class="content">
    <div class="eyebrow">A member-led resource for the treaty and its 21 nations</div>
    <h1>Robinson Huron Treaty<span class="dot">.</span></h1>
    <p class="subline">What the 1850 treaty is, the communities of the territory, what is happening on the land, and the member-led transparency work on the shared settlement.</p>
    <div class="foot">
      <span class="url">rhtcircle.ca</span>
      <span class="sep"></span>
      <span class="tagline">Prepared by members, for members.</span>
    </div>
  </div>
</body>
</html>
